{% extends "base.html" %}
{% block title %}Quản lý server — Đăng nhập{% endblock %}
{% block body_class %}login-shell{% endblock %}
{% block content %}
<main>
  <div class="card" role="region" aria-labelledby="login-heading">
    <h1 id="login-heading" class="card-heading">Quản lý server</h1>
    <p class="card-subheading">Đăng nhập để tiếp tục</p>

    {% if error %}
      <div class="error-banner" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" novalidate>
      {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
      {% endif %}

      <div class="form-field{% if error %} has-error{% endif %}">
        <label for="login-username">Tên đăng nhập</label>
        <input
          id="login-username"
          name="username"
          type="text"
          autocomplete="username"
          required
          {% if not error %}autofocus{% endif %}
          value="{{ username|default('', true) }}"
        >
      </div>

      <div class="form-field{% if error %} has-error{% endif %}">
        <label for="login-password">Mật khẩu</label>
        <input
          id="login-password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          {% if error %}autofocus{% endif %}
        >
      </div>

      <button class="btn-primary" type="submit">Đăng nhập</button>
    </form>
  </div>
</main>
{% endblock %}
